version: '3.8'

services:
  db:
    image: postgres:15
    container_name: rivyou_db
    environment:
      POSTGRES_DB: rivyou
      POSTGRES_USER: rivyou
      POSTGRES_PASSWORD: Vish@1724
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rivyou_network

  redis:
    image: redis:7
    container_name: rivyou_redis
    ports:
      - "6379:6379"
    networks:
      - rivyou_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rivyou_backend
    command: >
      bash -c "python manage.py makemigrations users products analytics &&
               python manage.py migrate &&
               python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-rivyou-secret-key-for-development-12345
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://rivyou:Vish@1724@db:5432/rivyou
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - JWT_SECRET_KEY=django-insecure-rivyou-secret-key-for-development-12345
    depends_on:
      - db
      - redis
    networks:
      - rivyou_network

  rq_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rivyou_rq_worker
    command: python manage.py rqworker default
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-rivyou-secret-key-for-development-12345
      - ALLOWED_HOSTS=*
      - DATABASE_URL=postgres://rivyou:Vish@1724@db:5432/rivyou
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173
      - JWT_SECRET_KEY=django-insecure-rivyou-secret-key-for-development-12345
    depends_on:
      - db
      - redis
    networks:
      - rivyou_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rivyou_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - rivyou_network

volumes:
  postgres_data:

networks:
  rivyou_network:
    driver: bridge
